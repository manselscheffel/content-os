# Competitor channels to monitor
# handle: YouTube handle (used for MCP lookups)
# name: Display name
# priority: high = every run, medium = 2-3x/week, low = weekly signal source
# weaknesses: Known strategic weaknesses
# your_angle: How you differentiate against them
#
# TEMPLATE: Replace the examples below with your actual competitors.

competitors:
  - handle: "@example-competitor-1"
    name: "Competitor One"
    priority: high
    weaknesses: "Describe their known weaknesses here"
    your_angle: "How you differentiate against them"

  - handle: "@example-competitor-2"
    name: "Competitor Two"
    priority: medium
    weaknesses: "Describe their known weaknesses here"
    your_angle: "How you differentiate against them"

  # Add more competitors as needed:
  # - handle: "@channel-handle"
  #   name: "Display Name"
  #   priority: high  # high, medium, or low
  #   weaknesses: "What they get wrong or skip"
  #   your_angle: "Your unique advantage over them"

settings:
  default_lookback_days: 3
  max_videos_per_channel: 10
  skip_shorts: true
  output_dir: "data/competitor_analyses"
